name: Flutter Build & Release (Config Moodle)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Versão/Tag (ex.: v1.2.3 ou V1.2.3-RC5)"
        required: true
        type: string
      notes:
        description: "Notas da release (opcional)"
        required: false
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ─── 1. Normalizar versão ──────────────────────────────────────────────
  prepare:
    runs-on: ubuntu-latest
    outputs:
      base_version: ${{ steps.ver.outputs.base_version }}
      wix_version:  ${{ steps.ver.outputs.wix_version }}
      msi_name:     ${{ steps.ver.outputs.msi_name }}
      apk_name:     ${{ steps.ver.outputs.apk_name }}
    steps:
      - name: Normalizar versão
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          RAW="${{ inputs.version }}"
          RAW="${RAW//[[:space:]]/}"
          CLEAN="${RAW#[vV]}"
          # Remove sufixo (ex.: -RC5) do número de versão
          BASE=$(echo "$CLEAN" | sed 's/-[A-Za-z].*//')
          # WiX exige formato X.Y.Z.W
          PARTS=$(echo "$BASE" | awk -F. '{print NF}')
          if [ "$PARTS" -eq 3 ]; then
            WIX="${BASE}.0"
          else
            WIX="$BASE"
          fi
          echo "base_version=$BASE"                             >> "$GITHUB_OUTPUT"
          echo "wix_version=$WIX"                              >> "$GITHUB_OUTPUT"
          echo "msi_name=ConfigMoodle-${BASE}-windows.msi"     >> "$GITHUB_OUTPUT"
          echo "apk_name=ConfigMoodle-${BASE}-android.apk"     >> "$GITHUB_OUTPUT"

  # ─── 2. Compilar e empacotar Windows MSI ──────────────────────────────
  build-windows-msi:
    runs-on: windows-latest
    needs: prepare
    env:
      MSI_NAME: ${{ needs.prepare.outputs.msi_name }}
      WIX_VER:  ${{ needs.prepare.outputs.wix_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Dependências Flutter
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      - name: Adicionar WiX Toolset ao PATH
        shell: powershell
        run: |
          $wixDir = Get-ChildItem "C:\Program Files (x86)" -Filter "WiX Toolset*" -Directory `
                    | Sort-Object Name -Descending | Select-Object -First 1
          if (-not $wixDir) {
            Write-Output "WiX não encontrado, instalando via Chocolatey..."
            choco install wixtoolset -y --no-progress
            $wixDir = Get-ChildItem "C:\Program Files (x86)" -Filter "WiX Toolset*" -Directory `
                      | Sort-Object Name -Descending | Select-Object -First 1
          }
          $wixBin = "$($wixDir.FullName)\bin"
          Write-Output "WiX encontrado em: $wixBin"
          "$wixBin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Colher arquivos do build (heat.exe)
        shell: powershell
        run: |
          $buildDir = "build\windows\x64\runner\Release"
          heat.exe dir $buildDir `
            -nologo -srd -scom -sreg `
            -cg HarvestedFiles `
            -dr INSTALLFOLDER `
            -var var.BuildDir `
            -ag `
            -out "windows\installer\harvested.wxs"

      - name: Compilar WiX (candle.exe)
        shell: powershell
        run: |
          $buildDir = (Resolve-Path "build\windows\x64\runner\Release").Path
          $appExe   = "$buildDir\config_moodle.exe"
          New-Item -ItemType Directory -Force -Path "windows\installer\obj" | Out-Null
          candle.exe -nologo -arch x64 `
            "-dProductVersion=$env:WIX_VER" `
            "-dBuildDir=$buildDir" `
            "-dAppExe=$appExe" `
            "windows\installer\product.wxs" `
            "windows\installer\harvested.wxs" `
            -out "windows\installer\obj\"

      - name: Vincular MSI (light.exe)
        shell: powershell
        run: |
          light.exe -nologo `
            -ext WixUIExtension `
            -ext WixUtilExtension `
            "windows\installer\obj\product.wixobj" `
            "windows\installer\obj\harvested.wixobj" `
            -out "$env:MSI_NAME"

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: ${{ env.MSI_NAME }}
          if-no-files-found: error

  # ─── 3. Compilar Android APK ──────────────────────────────────────────
  build-android-apk:
    runs-on: ubuntu-latest
    needs: prepare
    env:
      APK_NAME: ${{ needs.prepare.outputs.apk_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Configurar Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Dependências Flutter
        run: flutter pub get

      - name: Build APK release
        run: flutter build apk --release

      - name: Renomear APK
        run: mv build/app/outputs/flutter-apk/app-release.apk "$APK_NAME"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: ${{ env.APK_NAME }}
          if-no-files-found: error

  # ─── 4. Compilar Flutter Web e publicar no GitHub Pages ─────────────
  build-web:
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Dependências Flutter
        run: flutter pub get

      - name: Build Web release
        run: flutter build web --release --base-href "/${{ github.event.repository.name }}/"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy-pages:
    runs-on: ubuntu-latest
    needs: build-web
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ─── 5. Criar GitHub Release ──────────────────────────────────────────
  create-release:
    runs-on: ubuntu-latest
    needs: [prepare, build-windows-msi, build-android-apk, deploy-pages]
    steps:
      - name: Download MSI
        uses: actions/download-artifact@v4
        with:
          name: windows-msi

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk

      - name: Criar Release e anexar artefatos
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: "Config Moodle ${{ inputs.version }}"
          body: ${{ inputs.notes }}
          prerelease: false
          target_commitish: ${{ github.sha }}
          files: |
            ${{ needs.prepare.outputs.msi_name }}
            ${{ needs.prepare.outputs.apk_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
